<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CK-Grid Developer Demo</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        font-family: sans-serif;
        overflow: hidden;
      }
      #sidebar {
        width: 250px;
        background-color: #f8f9fa;
        border-right: 1px solid #dee2e6;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        box-sizing: border-box;
      }
      #main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        overflow: hidden;
      }
      #grid-container {
        flex: 1;
        width: 100%;
        min-height: 0;
      }
      .setting-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      label {
        font-size: 13px;
        font-weight: bold;
        color: #495057;
      }
      input[type="number"], select {
        padding: 5px;
        border: 1px solid #ced4da;
        border-radius: 4px;
      }
      .checkbox-group {
        flex-direction: row;
        align-items: center;
        gap: 10px;
      }
      button {
        padding: 8px;
        background-color: #2196f3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #1976d2;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h3>CK-Grid Settings</h3>
      
      <div class="setting-group checkbox-group">
        <input type="checkbox" id="enable-pagination" checked />
        <label for="enable-pagination">Use Pagination</label>
      </div>

      <div class="setting-group">
        <label for="page-size">Page Size</label>
        <select id="page-size">
          <option value="50">50 rows</option>
          <option value="100" selected>100 rows</option>
          <option value="200">200 rows</option>
          <option value="500">500 rows</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="row-height">Row Height (px)</label>
        <input type="number" id="row-height" value="32" />
      </div>

      <div class="setting-group">
        <label for="header-height">Header Height (px)</label>
        <input type="number" id="header-height" value="40" />
      </div>

      <hr style="width: 100%; border: 0; border-top: 1px solid #dee2e6;" />

      <div class="setting-group">
        <label>Data Actions</label>
        <button id="btn-add-rows">Add 10,000 Rows</button>
        <button id="btn-reset-data" style="background-color: #f44336;">Reset Data</button>
      </div>

      <div style="margin-top: auto; font-size: 11px; color: #6c757d;">
        <p>Shortcuts:</p>
        <ul>
          <li>F2: Edit</li>
          <li>Shift+Arrows: Select</li>
          <li>Ctrl+C/V: Copy/Paste</li>
          <li>Ctrl+Z: Undo</li>
        </ul>
      </div>
    </div>

    <div id="main-content">
      <h2 style="margin-top: 0;">Developer Control Panel</h2>
      <div id="grid-container"></div>
    </div>

    <script type="module">
      import { CKGrid } from './src/index.ts';

      const columns = [
        { field: 'id', headerName: 'ID', width: 80, sortable: true },
        { field: 'name', headerName: 'Name', width: 150, sortable: true },
        { field: 'category', headerName: 'Category', width: 120, sortable: true },
        { field: 'price', headerName: 'Price', width: 100, sortable: true,
          formatter: ({value}) => `$ ${parseFloat(value).toFixed(2)}`,
          cellStyle: ({value}) => value > 500 ? { color: 'red', fontWeight: 'bold' } : {}
        },
        { field: 'stock', headerName: 'Stock', width: 100, sortable: true },
        { field: 'score', headerName: 'Score', width: 100, sortable: true },
      ];

      function generateData(count, startId = 0) {
        const data = [];
        const cats = ['Electronics', 'Home', 'Office', 'Outdoor'];
        for (let i = 0; i < count; i++) {
          const id = startId + i;
          data.push({
            id: id,
            name: `Product ${id}`,
            category: cats[id % 4],
            price: (Math.random() * 1000),
            stock: Math.floor(Math.random() * 100),
            score: Math.floor(Math.random() * 100),
          });
        }
        return data;
      }

      let data = generateData(1000);

      const grid = new CKGrid({
        container: document.getElementById('grid-container'),
        columns,
        data,
        rowHeight: 32,
        headerHeight: 40,
        pagination: true,
        pageSize: 100
      });

      // --- UI Events ---

      document.getElementById('enable-pagination').addEventListener('change', (e) => {
        grid.updateOptions({ pagination: e.target.checked });
      });

      document.getElementById('page-size').addEventListener('change', (e) => {
        grid.updateOptions({ pageSize: parseInt(e.target.value) });
      });

      document.getElementById('row-height').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        if (val > 10) grid.updateOptions({ rowHeight: val });
      });

      document.getElementById('header-height').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        if (val > 10) grid.updateOptions({ headerHeight: val });
      });

      document.getElementById('btn-add-rows').addEventListener('click', () => {
        const newData = generateData(10000, data.length);
        data = [...data, ...newData];
        grid.updateData(data);
      });

      document.getElementById('btn-reset-data').addEventListener('click', () => {
        data = generateData(1000);
        grid.updateData(data);
      });
    </script>
  </body>
</html>
